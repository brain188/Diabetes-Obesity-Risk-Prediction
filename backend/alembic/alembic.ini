# alembic.ini
# Alembic configuration file for database migrations

[alembic]
# Path to the Alembic script directory
script_location = alembic

# Template used to generate migration files
# Available templates: generic, async
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Comment length for truncating migration comments
truncate_slug_length = 40

# Set to 'true' to run the environment during 'revision' command
revision_environment = false

# Set to 'true' to enable the 'process_revision_directives' function
process_revision_directives = true

# SQLAlchemy URL - overridden in env.py
# sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
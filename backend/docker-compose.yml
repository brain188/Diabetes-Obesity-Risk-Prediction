# docker-compose.yml
# Docker Compose configuration for Intelligent DSS

version: '3.8'

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend API
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dss_backend
    restart: unless-stopped
    env_file:
      - .env.docker      # Load all environment variables from this file
    environment:
      # These override .env.docker values if needed
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs          # Application logs
      - ./reports:/app/reports    # Generated PDF reports
      - ./model:/app/model        # Kedro model artifacts (trained_model.pkl, etc.)
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s    # Give time for ML artifacts to load at startup
    networks:
      - dss_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dss_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dss_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
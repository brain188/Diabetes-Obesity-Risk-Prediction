# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog


diabetes_train_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes_train.csv
  load_args:
    dtype:
      is_pregnant:              bool
      family_history_diabetes:  bool
      previous_gdm:             bool
      physically_active:        bool
      has_hypertension:         bool   


diabetes_test_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes_test.csv
  load_args:
    dtype:
      is_pregnant:              bool
      family_history_diabetes:  bool
      previous_gdm:             bool
      physically_active:        bool
      has_hypertension:         bool

# data_processing outputs (data/02_intermediate/)

diabetes_train_cleaned:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/diabetes_train_cleaned.parquet
  save_args:
    # engine 'pyarrow' preserves int32/int64 dtypes exactly as written
    engine: pyarrow
 
diabetes_test_cleaned:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/diabetes_test_cleaned.parquet
  save_args:
    engine: pyarrow

 
# feature_engineering outputs (data/03_primary/)

diabetes_train_featured:
  type: pandas.ParquetDataset
  filepath: data/03_primary/diabetes_train_featured.parquet
 
diabetes_test_featured:
  type: pandas.ParquetDataset
  filepath: data/03_primary/diabetes_test_featured.parquet
 
 
# FEATURE ENGINEERING OUTPUTS  (data/03_primary/)
# Written by the feature_engineering pipeline.
# Read by the training pipeline.
 
# ── Feature matrices (X)
 
X_train:
  type: pandas.ParquetDataset
  filepath: data/03_primary/X_train.parquet
  save_args:
    engine: pyarrow
 
X_val:
  type: pandas.ParquetDataset
  filepath: data/03_primary/X_val.parquet
  save_args:
    engine: pyarrow
 
X_test:
  type: pandas.ParquetDataset
  filepath: data/03_primary/X_test.parquet
  save_args:
    engine: pyarrow
 
# Target vectors (y)
 
y_train_final:
  type: pandas.ParquetDataset
  filepath: data/03_primary/y_train.parquet
  save_args:
    engine: pyarrow
 
y_val_final:
  type: pandas.ParquetDataset
  filepath: data/03_primary/y_val.parquet
  save_args:
    engine: pyarrow
 
y_test_final:
  type: pandas.ParquetDataset
  filepath: data/03_primary/y_test.parquet
  save_args:
    engine: pyarrow
 
# Fitted scaler artifact
# The MinMaxScaler fitted on the training set.
# Saved here so the FastAPI backend can load it at inference time and apply
# the exact same scaling transformation to new patient inputs.
 
scaler:
  type: pickle.PickleDataset
  filepath: data/06_models/scaler.pkl


# Training intermediate outputs (data/04_feature/)

candidate_results:
  type: pickle.PickleDataset
  filepath: data/04_feature/candidate_results.pkl

best_val_metrics:
  type: json.JSONDataset
  filepath: data/04_feature/best_val_metrics.json

best_model_name:
  type: pickle.PickleDataset
  filepath: data/04_feature/best_model_name.pkl

best_model:
  type: pickle.PickleDataset
  filepath: data/04_feature/best_model.pkl

evaluation_report:
  type: json.JSONDataset
  filepath: data/08_reporting/evaluation_report.json


# Training Outputs (data/06_models/)

trained_model:
  type: pickle.PickleDataset
  filepath: data/06_models/trained_model.pkl

model_metadata:
  type: json.JSONDataset
  filepath: data/08_reporting/model_metadata.json


# EVALUATION OUTPUTS  (data/08_reporting/ and data/06_models/)
# Written by the evaluation pipeline.
# Plots stored as pickle (bytes) so they can be opened as PNG files directly.
 
# Confusion matrix plot
confusion_matrix_png:
  type: text.TextDataset
  filepath: data/08_reporting/confusion_matrix_path.txt

roc_curves_png:
  type: text.TextDataset
  filepath: data/08_reporting/roc_curves_path.txt

shap_bar_png:
  type: text.TextDataset
  filepath: data/08_reporting/shap_bar_path.txt

shap_beeswarm_png:
  type: text.TextDataset
  filepath: data/08_reporting/shap_beeswarm_path.txt
 
# SHAP explainer artifact
# Fitted SHAP TreeExplainer — loaded by the FastAPI backend at startup
# and reused for every per-patient explanation request.
 
shap_explainer:
  type: pickle.PickleDataset
  filepath: data/06_models/shap_explainer.pkl
 
# Full evaluation report
# JSON with all metrics, thresholds, feature names, and classification report.
# Served by the FastAPI /model/info endpoint.
 
full_evaluation_report:
  type: json.JSONDataset
  filepath: data/08_reporting/full_evaluation_report.json




# Prediction pipeline catalog entries

raw_patient:
  type: kedro.io.MemoryDataset

# Prediction pipeline intermediates (all in-memory)

validated_patient:
  type: kedro.io.MemoryDataset

patient_features:
  type: kedro.io.MemoryDataset

prediction_output:
  type: kedro.io.MemoryDataset

risk_band_output:
  type: kedro.io.MemoryDataset

explanation_output:
  type: kedro.io.MemoryDataset

# Final prediction response
prediction_response:
  type: kedro.io.MemoryDataset
 
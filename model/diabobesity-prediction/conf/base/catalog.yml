# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog


diabetes_train_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes_train.csv
  load_args:
    dtype:
      is_pregnant:              bool
      family_history_diabetes:  bool
      previous_gdm:             bool
      physically_active:        bool
      has_hypertension:         bool   


diabetes_test_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes_test.csv
  load_args:
    dtype:
      is_pregnant:              bool
      family_history_diabetes:  bool
      previous_gdm:             bool
      physically_active:        bool
      has_hypertension:         bool

# data_processing outputs (data/02_intermediate/)

diabetes_train_cleaned:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/diabetes_train_cleaned.parquet
  save_args:
    # engine 'pyarrow' preserves int32/int64 dtypes exactly as written
    engine: pyarrow
 
diabetes_test_cleaned:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/diabetes_test_cleaned.parquet
  save_args:
    engine: pyarrow

 
# feature_engineering outputs (data/03_primary/)

diabetes_train_featured:
  type: pandas.ParquetDataset
  filepath: data/03_primary/diabetes_train_featured.parquet
 
diabetes_test_featured:
  type: pandas.ParquetDataset
  filepath: data/03_primary/diabetes_test_featured.parquet
 
# --- training outputs (data/06_models/) ---
# scaler:
#   type: pickle.PickleDataset

data_processing:
  columns_to_keep:
    - age
    - sex
    - is_pregnant
    - bmi
    - bmi_category
    - family_history_diabetes
    - previous_gdm
    - physically_active
    - has_hypertension
    - residence
    - diabetes_status

  target_map:
    normal: 0
    prediabetes: 1
    diabetic: 2

  boolean_columns:
    - is_pregnant
    - family_history_diabetes
    - previous_gdm
    - physically_active
    - has_hypertension

  bmi_map:
    normal: 0
    overweight: 1
    obese i: 2
    obese ii+: 3

  sex_map:
    female: 0
    male: 1

  residence_map:
    rural: 0
    urban: 1


feature_engineering:

  # Train / Validation split
  val_size:     0.20   # 80 % train, 20 % validation (from train.csv)
  random_state: 42     # seed for reproducibility across all runs.
 
  # Feature / target separation
  target_col: diabetes_status
 
  drop_cols:
    - diabetes_status        # encoded integer target — must not be a feature
    - diabetes_status_raw    # raw string label kept only for reporting
 
  smote_random_state: 42
  smote_k_neighbors:  5


training:
  
  # MLflow experiment tracking
  mlflow_experiment_name: diabetes_dss_training

  # Cross-validation
  cv_folds: 5  # number of stratified k-fold splits used for candidate evaluation
  random_state: 42